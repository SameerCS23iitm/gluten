name: fetch-gluten-piceberg-deps
on: workflow_dispatch
jobs:
  fetch:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: apache/gluten
          ref: main
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Resolve all -Piceberg dependencies
        run: |
          mvn dependency:go-offline \
            -Pbackends-velox -Piceberg -Pspark-3.5 \
            --fail-at-end -q || true
          find /home/runner/.m2/repository/org/apache \
               /home/runner/.m2/repository/org/codehaus \
            -name '_remote.repositories' \
            -exec sed -i 's/>central=/>=/g;s/>releases=/>=/g' {} \; 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: gluten-piceberg-deps
          path: |
            /home/runner/.m2/repository/org/apache/
            /home/runner/.m2/repository/org/codehaus/
