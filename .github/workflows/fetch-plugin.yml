name: fetch-all-gluten-deps
on: workflow_dispatch
jobs:
  fetch:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          repository: apache/gluten
          ref: 4df6e9cd10a2a5b232eebd1390f9baa0bc3ec6e5
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Run build to force-resolve every dependency
        run: |
          mvn package -Pbackends-velox -Piceberg -Pspark-3.5 -DskipTests --fail-never -q || true
          find /home/runner/.m2/repository -name '_remote.repositories' \
            -exec sed -i 's/>[^=]*=/>=/g' {} \;
          find /home/runner/.m2/repository -name '*.lastUpdated' -delete
      - name: Zip the repository
        run: cd /home/runner/.m2 && zip -rq m2repo.zip repository
      - uses: actions/upload-artifact@v4
        with:
          name: full-m2
          path: /home/runner/.m2/m2repo.zip
